name: Yeonsu vacancy monitor

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Restore storage state
        env:
          STORAGE_STATE: ${{ secrets.STORAGE_STATE }}
        run: |
          if [ -z "$STORAGE_STATE" ]; then
            echo "Missing STORAGE_STATE secret"
            exit 1
          fi
          mkdir -p .codex-state
          printf '%s' "$STORAGE_STATE" > .codex-state/storage_state.json

      - name: Create env file
        run: |
          cat > .env <<EOF
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          YEONSU_BASE_URL=https://yeonsu.eseoul.go.kr
          YEONSU_RESORTS=${{ secrets.YEONSU_RESORTS }}
          YEONSU_ROOM_TYPES=A,B,C,O
          POLL_INTERVAL_SECONDS=60
          EOF

      - name: Run check
        run: python -m yeonsu_monitor check
