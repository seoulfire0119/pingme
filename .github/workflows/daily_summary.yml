name: Yeonsu daily summary

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  summary:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('requirements.txt') }}

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Create env file
        run: |
          cat > .env <<'ENVEOF'
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          YEONSU_BASE_URL=https://yeonsu.eseoul.go.kr
          YEONSU_USERNAME=${{ secrets.YEONSU_USERNAME }}
          YEONSU_PASSWORD=${{ secrets.YEONSU_PASSWORD }}
          YEONSU_RESORTS=00003002,00003003,00003004,00003005,00003006,00003008,00003009,00003010,00003011,00003012
          YEONSU_ROOM_TYPES=A,B,C,O
          POLL_INTERVAL_SECONDS=60
          ENVEOF

      - name: Login
        run: python -m yeonsu_monitor login

      - name: Send daily summary
        run: python -m yeonsu_monitor summary
